# docker-compose.yml - Entorno de Desarrollo Unificado
# Construcción: docker compose up --build -d
# Apagado: docker compose down
# Logs: docker compose logs -f [servicio]

version: '3.9'

services:
  # ============================================================
  # FRONTEND - Next.js PWA con Tailwind CSS
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: biblioteka_frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_WS_URL: ws://localhost:3001/ws
    volumes:
      # Hot-reload: cambios en código se reflejan inmediatamente
      - ./frontend:/app
      # Evitar sincronizar node_modules
      - /app/node_modules
      - /app/.next
    networks:
      - biblioteka_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ============================================================
  # BACKEND - Node.js + Express/Fastify + Prisma ORM
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: biblioteka_backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      # PostgreSQL
      DATABASE_URL: postgresql://biblioteka_user:biblioteka_pass@database:5432/biblioteka_dev
      # JWT y Seguridad
      JWT_SECRET: dev-secret-key-change-in-production-12345
      JWT_EXPIRY: 24h
      # API configuración
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      # Modo Offline (fallback)
      SQLITE_PATH: /app/data/biblioteka_local.db
      ENABLE_SQLITE_FALLBACK: "true"
      # Redis para caché (opcional)
      REDIS_URL: redis://redis:6379
      # Variables de negocio
      MULTI_TENANT_ISOLATION: "strict"
      BARCODE_ALGORITHM: "ean13"
    volumes:
      # Hot-reload para desarrollo
      - ./backend:/app
      # Evitar sincronizar node_modules
      - /app/node_modules
      # Persistencia de datos locales
      - biblioteka_sqlite_data:/app/data
    networks:
      - biblioteka_network
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ============================================================
  # DATABASE - PostgreSQL (Simula entorno Cloud)
  # ============================================================
  database:
    image: postgres:15-alpine
    container_name: biblioteka_database
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: biblioteka_user
      POSTGRES_PASSWORD: biblioteka_pass
      POSTGRES_DB: biblioteka_dev
      # Configuración para desarrollo - NO usar en producción
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_ES.UTF-8"
    volumes:
      # Persistencia de datos PostgreSQL
      - biblioteka_postgres_data:/var/lib/postgresql/data
      # Scripts de inicialización
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./docker/seed-db.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - biblioteka_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biblioteka_user -d biblioteka_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # REDIS - Caché y Sesiones (Opcional pero recomendado)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: biblioteka_redis
    ports:
      - "6379:6379"
    volumes:
      - biblioteka_redis_data:/data
    networks:
      - biblioteka_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ============================================================
# VOLÚMENES PERSISTENTES
# ============================================================
volumes:
  biblioteka_postgres_data:
    driver: local
  biblioteka_sqlite_data:
    driver: local
  biblioteka_redis_data:
    driver: local

# ============================================================
# RED INTERNA
# ============================================================
networks:
  biblioteka_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
